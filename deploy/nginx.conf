# EnergyDispenX – Nginx production (fixed ports)
#
# Port map (match Vite dev ports in admin/staff/station and server/.env.example):
#   4601  Node.js API (Express)     →  server: PORT=4601
#   4602  Admin SPA + /api proxy
#   4604  Staff SPA + /api proxy + /releases/ (APK)
#   4605  Station SPA + /api proxy
#
# Build outputs (adjust paths for your server), e.g.:
#   /var/www/energydispenx/admin/dist
#   /var/www/energydispenx/staff/dist
#   /var/www/energydispenx/station/dist
#   /var/www/energydispenx/releases   ← copy app-release.apk here (served on staff :4604 and admin :4602)
#
# Start API:  cd server && PORT=4601 npm run start  (or node dist/index.js after build)
# TRUST_PROXY=1 in server/.env when nginx sets X-Forwarded-For.

upstream dispenx_api {
    server 127.0.0.1:4601;
    keepalive 32;
}

# ─── Shared snippets (inline per server for clarity) ─────────────────────

# Admin — http://your-host:4602/
server {
    listen 4602;
    server_name _;

    root /var/www/energydispenx/admin/dist;
    index index.html;

    location /api/ {
        proxy_pass http://dispenx_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /releases/ {
        alias /var/www/energydispenx/releases/;
        default_type application/octet-stream;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 5m;
}

# Staff — http://your-host:4604/
server {
    listen 4604;
    server_name _;

    root /var/www/energydispenx/staff/dist;
    index index.html;

    location /api/ {
        proxy_pass http://dispenx_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Mobile APK — copy e.g. app-release.apk into this directory on the server
    location /releases/ {
        alias /var/www/energydispenx/releases/;
        default_type application/octet-stream;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
